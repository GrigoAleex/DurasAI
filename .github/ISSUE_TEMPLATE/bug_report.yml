name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please share enough detail to reproduce it.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug in 1-3 clear sentences.
      placeholder: When I press and hold in the GUI, recording never starts.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps and inputs.
      placeholder: |
        1. Run `python gui_app.py`
        2. Hold the Talk button for 3 seconds
        3. Release and observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: It should record and proceed to transcription.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: It returns to idle without recording.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and how you run the app.
      placeholder: macOS 14.6, Python 3.12, `python gui_app.py`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Paste relevant output. Remove secrets before posting.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this one.
          required: true
        - label: I removed sensitive data from logs and screenshots.
          required: true
